<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civitas Dishwasher · Vermögensregister</title>
<style>
:root {
  --parchment: #f0e0bc;
  --parchment-light: #f8eecf;
  --parchment-dark: #d4ba80;
  --ink: #3d2817;
  --ink-light: #5c3d22;
  --gold: #a87830;
  --gold-bright: #c79a4a;
  --wax-red: #8b2c1e;
  --shadow: rgba(20, 12, 4, 0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
  background: #1a0f06;
  background-image: radial-gradient(ellipse at top, #2a1a0c 0%, #0a0502 95%);
  color: var(--ink);
  min-height: 100vh;
  padding: 28px 16px 40px;
}
h1 {
  text-align: center;
  color: var(--gold-bright);
  font-size: 2.6em;
  font-variant: small-caps;
  letter-spacing: 12px;
  font-weight: normal;
  margin-bottom: 6px;
  text-shadow: 0 0 24px rgba(199, 154, 74, 0.5), 2px 2px 6px rgba(0,0,0,0.9);
}
.subtitle {
  text-align: center;
  color: #b89866;
  font-style: italic;
  font-variant: small-caps;
  letter-spacing: 4px;
  margin-bottom: 26px;
  font-size: 0.9em;
}
.subtitle::before { content: '❦  '; color: var(--gold); }
.subtitle::after { content: '  ❦'; color: var(--gold); }
.controls { text-align: center; margin-bottom: 28px; }
button {
  background: var(--ink);
  color: var(--parchment);
  border: 1px solid var(--gold);
  padding: 9px 18px;
  font-family: inherit;
  font-variant: small-caps;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 0;
  margin: 0 4px 4px;
  font-size: 13px;
  transition: all 0.15s;
}
button:hover {
  background: var(--ink-light);
  border-color: var(--gold-bright);
  box-shadow: 0 0 10px rgba(199, 154, 74, 0.4);
}
button.primary {
  background: var(--wax-red);
  border-color: var(--gold-bright);
  color: var(--gold-bright);
}
button.primary:hover { background: #a3331f; }
button.danger { color: #d47057; border-color: #8b2c1e; }
.layout {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 28px;
}
.panel {
  background: radial-gradient(ellipse at center, var(--parchment-light) 0%, var(--parchment) 50%, var(--parchment-dark) 100%);
  padding: 32px 38px;
  position: relative;
  box-shadow: inset 0 0 80px rgba(139, 90, 30, 0.18), 0 8px 36px var(--shadow);
}
.panel::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 1px solid var(--ink);
  opacity: 0.55;
  pointer-events: none;
}
.panel::after {
  content: '';
  position: absolute;
  inset: 16px;
  border: 1px solid var(--ink);
  opacity: 0.25;
  pointer-events: none;
}
.panel h2 {
  text-align: center;
  font-variant: small-caps;
  letter-spacing: 6px;
  color: var(--ink);
  font-size: 1.35em;
  font-weight: normal;
  margin-bottom: 18px;
}
.panel h2::before { content: '⚜  '; color: var(--gold); }
.panel h2::after { content: '  ⚜'; color: var(--gold); }
.map-wrap { width: 100%; max-width: 920px; margin: 0 auto; }
#cityMap { width: 100%; height: auto; display: block; }
.fam-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width: 800px) { .fam-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .fam-grid { grid-template-columns: 1fr; } }
.fam-card {
  background: rgba(248, 238, 207, 0.6);
  border: 1px solid var(--ink);
  padding: 14px 12px 16px;
  position: relative;
  text-align: center;
}
.fam-card::after {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid var(--ink);
  opacity: 0.25;
  pointer-events: none;
}
.fam-card .crest {
  width: 64px;
  height: 76px;
  margin: 0 auto 4px;
  display: block;
  object-fit: contain;
  filter: drop-shadow(0 2px 3px rgba(20, 12, 4, 0.4));
}
.fam-name {
  font-variant: small-caps;
  letter-spacing: 3px;
  font-size: 1em;
  color: var(--ink);
  font-weight: bold;
  margin-bottom: 4px;
}
.fam-coins {
  font-size: 2.1em;
  color: var(--ink);
  line-height: 1;
  margin: 4px 0 2px;
  font-weight: bold;
}
.fam-coins::after {
  content: ' ⚜';
  color: var(--gold);
}
.fam-income b {
  font-weight: bold;
  color: var(--ink);
  font-style: normal;
}
.fam-income {
  font-size: 0.85em;
  color: var(--ink-light);
  font-style: italic;
}
.fam-buildings {
  margin-top: 10px;
  font-size: 0.85em;
  color: var(--ink-light);
  font-variant: small-caps;
  letter-spacing: 1px;
  display: flex;
  justify-content: center;
  gap: 14px;
  align-items: baseline;
}
.fam-buildings b {
  font-size: 1.25em;
  font-weight: bold;
  color: var(--ink);
  font-variant: normal;
  margin-left: 2px;
}
.fam-edit {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--ink-light);
  display: none;
}
.editing .fam-edit { display: block; }
.fam-edit-row {
  display: flex;
  gap: 4px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.fam-edit button {
  padding: 4px 8px;
  font-size: 11px;
  margin: 0;
  letter-spacing: 1px;
}
.fam-edit input {
  width: 64px;
  padding: 4px;
  background: var(--parchment-light);
  color: var(--ink);
  border: 1px solid var(--ink);
  font-family: inherit;
  text-align: center;
  font-size: 12px;
}
.fam-edit-lbl {
  font-variant: small-caps;
  letter-spacing: 1px;
  font-size: 12px;
  font-weight: bold;
  color: var(--ink);
  min-width: 14px;
  text-align: center;
  align-self: center;
}
.fam-edit-row.tight { gap: 3px; }
.fam-edit-row.tight input { width: 58px; }
.fam-edit-row.tight button { padding: 4px 6px; }
.stand-info {
  text-align: center;
  color: var(--ink-light);
  font-size: 11px;
  margin-top: 18px;
  font-style: italic;
  font-variant: small-caps;
  letter-spacing: 2px;
}
.add-fam {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px dashed var(--ink);
  display: none;
  justify-content: center;
  gap: 6px;
}
.editing .add-fam { display: flex; }
.add-fam input {
  padding: 6px 10px;
  background: var(--parchment-light);
  color: var(--ink);
  border: 1px solid var(--ink);
  font-family: inherit;
  width: 200px;
}
#vz-page { transform-origin: center center; will-change: transform, filter; }
#vz-page.verkehrte-zeit {
  transform: rotate(180deg);
  filter: hue-rotate(15deg) sepia(0.18) contrast(1.05);
}
#vz-page.verkehrte-zeit h1 {
  color: var(--wax-red);
  text-shadow: 0 0 22px rgba(139, 44, 30, 0.6), 2px 2px 6px rgba(0,0,0,0.9);
}
#vz-page.verkehrte-zeit .subtitle { color: #d47057; }
.fam-income.verkehrt {
  color: var(--wax-red) !important;
  font-weight: bold;
  font-style: normal;
}

@keyframes vz-flicker {
  0%, 100% { filter: brightness(1); }
  6%  { filter: brightness(0.25) contrast(1.4); }
  8%  { filter: brightness(1.35); }
  11% { filter: brightness(0.15); }
  14% { filter: brightness(1); }
  27% { filter: brightness(0.5); }
  30% { filter: brightness(1.15); }
  44% { filter: brightness(0.1); }
  48% { filter: brightness(0.9); }
  63% { filter: brightness(0.35) hue-rotate(20deg); }
  66% { filter: brightness(1); }
  82% { filter: brightness(0.2); }
  86% { filter: brightness(0.95); }
}
#vz-page.vz-flicker { animation: vz-flicker 3s steps(80) 1; }

@keyframes vz-rotate-in {
  0%   { transform: rotate(0deg);   filter: brightness(0.35); }
  18%  { transform: rotate(14deg);  filter: brightness(0.5); }
  100% { transform: rotate(180deg); filter: hue-rotate(15deg) sepia(0.18) contrast(1.05) brightness(1); }
}
@keyframes vz-rotate-out {
  0%   { transform: rotate(180deg); filter: hue-rotate(15deg) sepia(0.18) contrast(1.05) brightness(0.4); }
  100% { transform: rotate(360deg); filter: brightness(1); }
}
#vz-page.vz-rotating-in  { animation: vz-rotate-in  5s cubic-bezier(.55,0,.3,1) forwards; }
#vz-page.vz-rotating-out { animation: vz-rotate-out 5s cubic-bezier(.55,0,.3,1) forwards; }

#vz-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  opacity: 0; background: #000;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
  transition: opacity 0.6s ease-in-out, background 0.6s ease-in-out;
}
#vz-overlay.vz-flickerbg { opacity: 0.55; background: radial-gradient(ellipse at center, rgba(0,0,0,0.7), rgba(0,0,0,0.95)); }
#vz-overlay.vz-black     { opacity: 1; background: #000; }
#vz-overlay.vz-dim       { opacity: 0.78; background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), rgba(0,0,0,0.92)); }
#vz-overlay.vz-clear     { opacity: 0; }
#vz-overlay .vz-inner { text-align: center; color: #c79a4a; max-width: 86vw; }
.vz-big {
  font-size: clamp(2.4em, 6.5vw, 5.2em);
  font-variant: small-caps;
  letter-spacing: 10px;
  text-shadow: 0 0 32px rgba(199,154,74,0.6), 0 0 6px #000;
  opacity: 0; margin-bottom: 0.25em;
  transition: opacity 0.9s ease-in-out, letter-spacing 2.4s ease-out, color 0.6s;
}
.vz-big.vz-show { opacity: 1; letter-spacing: 16px; }
.vz-big.vz-warn { color: #d47057; text-shadow: 0 0 36px rgba(212,112,87,0.8), 0 0 8px #000; }
.vz-small {
  font-size: clamp(1em, 1.5vw, 1.35em);
  font-style: italic; font-variant: small-caps; letter-spacing: 4px;
  opacity: 0; color: #b89866; min-height: 1.4em;
  transition: opacity 1s ease-in-out;
}
.vz-small.vz-show { opacity: 1; }
.vz-clock {
  width: clamp(170px, 22vw, 260px); height: clamp(170px, 22vw, 260px);
  margin: 26px auto 14px; opacity: 0;
  transition: opacity 0.9s ease-in-out;
  filter: drop-shadow(0 0 24px rgba(199,154,74,0.35));
}
.vz-clock.vz-show { opacity: 1; }
.vz-clock svg { width: 100%; height: 100%; }
@keyframes vz-hand-back { from { transform: rotate(360deg); } to { transform: rotate(-360deg); } }
.vz-clock .vz-min  { transform-origin: 100px 100px; animation: vz-hand-back 1.6s linear infinite; }
.vz-clock .vz-hour { transform-origin: 100px 100px; animation: vz-hand-back 19s linear infinite; }
.vz-clock.vz-fwd .vz-min,
.vz-clock.vz-fwd .vz-hour { animation-direction: reverse; }

@keyframes vz-pulse {
  0%, 100% { text-shadow: 0 0 22px rgba(139,44,30,0.6), 2px 2px 6px rgba(0,0,0,0.9); }
  50%      { text-shadow: 0 0 70px rgba(212,112,87,0.95), 0 0 16px rgba(139,44,30,0.9), 2px 2px 6px rgba(0,0,0,0.9); }
}
#vz-page.vz-final-pulse h1 { animation: vz-pulse 1.6s ease-in-out 1; }

#pw-backdrop {
  position: fixed; inset: 0; z-index: 10000;
  background: radial-gradient(ellipse at center, rgba(20,12,4,0.82), rgba(10,5,2,0.95));
  display: flex; align-items: center; justify-content: center;
  animation: pw-fade 0.25s ease-out;
  font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
}
@keyframes pw-fade { from { opacity: 0; } to { opacity: 1; } }
#pw-backdrop .pw-modal {
  background: radial-gradient(ellipse at center, var(--parchment-light) 0%, var(--parchment) 55%, var(--parchment-dark) 100%);
  padding: 32px 40px 26px;
  min-width: 320px;
  max-width: 90vw;
  position: relative;
  box-shadow: inset 0 0 60px rgba(139, 90, 30, 0.22), 0 12px 48px rgba(0,0,0,0.7);
}
#pw-backdrop .pw-modal::before {
  content: ''; position: absolute; inset: 10px;
  border: 1px solid var(--ink); opacity: 0.55; pointer-events: none;
}
#pw-backdrop .pw-modal::after {
  content: ''; position: absolute; inset: 14px;
  border: 1px solid var(--ink); opacity: 0.25; pointer-events: none;
}
#pw-backdrop .pw-title {
  text-align: center;
  font-variant: small-caps;
  letter-spacing: 5px;
  color: var(--ink);
  font-size: 1.25em;
  font-weight: bold;
  margin-bottom: 4px;
}
#pw-backdrop .pw-sub {
  text-align: center;
  font-style: italic;
  font-variant: small-caps;
  letter-spacing: 2px;
  color: var(--ink-light);
  font-size: 0.82em;
  margin-bottom: 18px;
}
#pw-backdrop .pw-input {
  display: block;
  width: 100%;
  padding: 10px 12px;
  background: var(--parchment-light);
  color: var(--ink);
  border: 1px solid var(--ink);
  font-family: inherit;
  font-size: 1.1em;
  letter-spacing: 4px;
  text-align: center;
  outline: none;
}
#pw-backdrop .pw-input:focus { box-shadow: 0 0 0 2px rgba(199,154,74,0.5); }
#pw-backdrop.pw-err .pw-input {
  animation: pw-shake 0.4s ease-in-out;
  border-color: var(--wax-red);
  box-shadow: 0 0 0 2px rgba(139,44,30,0.5);
}
@keyframes pw-shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
#pw-backdrop .pw-err-msg {
  min-height: 1em;
  text-align: center;
  color: var(--wax-red);
  font-size: 0.8em;
  font-style: italic;
  font-variant: small-caps;
  letter-spacing: 2px;
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.3s;
}
#pw-backdrop.pw-err .pw-err-msg { opacity: 1; }
#pw-backdrop .pw-buttons {
  display: flex; justify-content: center; gap: 10px;
  margin-top: 14px;
}
#pw-backdrop .pw-buttons button {
  margin: 0;
}
</style>
</head>
<body>

<h1>★ DISHWASHER ★</h1>
<div class="subtitle">Königliches Vermögensregister · Anno MMXXVI</div>

<div class="controls">
  <button id="editToggle">✎ Bearbeiten</button>
  <button id="vzToggle" style="display:none">⚡ Zeit verkehren</button>
  <!-- <button id="exportBtn">⬇ Export</button> -->
  <!-- <button id="importBtn">⬆ Import</button> -->
  <!-- <button id="resetBtn" class="danger">↺ Reset 08:00</button> -->
  <!-- <input type="file" id="importFile" accept=".json" style="display:none"> -->
</div>

<div class="layout">
  <div class="panel">
    <h2>Stadtkarte von Dishwasher</h2>
    <div class="map-wrap">
      <svg viewBox="0 0 900 820" id="cityMap" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
  <div class="panel" id="famPanel">
    <h2>Vermögensregister der Familien</h2>
    <div class="fam-grid" id="famGrid"></div>
    <div class="stand-info" id="standInfo"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.local.js" onerror="void 0"></script>
<script src="app.js"></script>
</body>
</html>
